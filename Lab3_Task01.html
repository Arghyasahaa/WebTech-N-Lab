<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form2</title>
</head>

<body>
    <h1>Student Registration Form using HTML</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>

            <label for="fname">Full Name:</label>
            <input type="text" name="fname" id="fname" placeholder="Enter your full name" required><br><br>

            <label for="sid">Student ID:</label>
            <input type="id" name="sid" id="sid" placeholder="Enter your  Student Id" required><br><br>

            <label for="email">Email :</label>
            <input type="email" name="email" id="email" placeholder="Enter your Email" required><br><br>

            <label for="phone">Phone:</label>
            <input type="phone" name="phone" id="phone" placeholder="Enter your Phone no" required><br><br>

            <label for="dob">DOB :</label>
            <input type="date" name="dob" dob required>


            <br><br />
            <label>Gender:</label>

            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label>


            <br></br>


            <label for="department">Department:</label> <br>
            <select id="department" name="department">
                <option>SELECT AN OPTION"</option>
                <option value="CSE"> CSE</option>
                <option value="EEE"> EEE</option>
                <option value="BBA">BBA</option>
                <option value="English">English</option>
                <option value="CIVIL">CIVIL</option>
            </select>


            <br><br />
            <label for="semester">Semester:</label> <br>
            <select id="semester" name="semester">
                <option>SELECT your semester"</option>
                <option value="1st Semester"> 1st Semester</option>
                <option value="2nd Semester"> 2nd Semester</option>
                <option value="3rd Semester">3rd Semester</option>
                <option value="4th Semester">4th Semester</option>
                <option value="5th Semester">5th Semester</option>
                <option value="6th Semester">6th Semester</option>
                <option value="7th Semester">7th Semester</option>
                <option value="8th Semester">8th Semester</option>

            </select>


            <br /><br />
            <label for="skills">Select a programming Language you know:</label> <br>
            <input type="checkbox" id="c" name="language" value="c" />
            <label for="c">C</label><br />
            <input type="checkbox" id="C++" name="language" value="C++" />
            <label for="C++">C++</label><br />
            <input type="checkbox" id="java" name="language" value="java" />
            <label for="java">Java</label><br />
            <input type="checkbox" id="python" name="language" value="python" />
            <label for="python">Python</label><br />
            <input type="checkbox" id="javascript" name="language" value="javascript" />
            <label for="javascript">JavaScript</label><br />

            <br /><br />
            <label for="additonal information">Additional information:</label> <br>

            <label for="addrrss">Enter your Address:</label><br />
            <textarea id="address" name="address" rows="2" cols="33"></textarea>

            <br><br />


            <label for="photo">Upload student photo</label><br />
            <input type="file" id="photo" name="photo" />

            <!-- <br /><br />
            <label for="story">Tell us your story:</label>
            <br /><br />
            <textarea id="story" name="story" rows="5" cols="33"></textarea> -->

            <br><br />

            <label for="comments">Enter your Comments:</label><br />
            <textarea id="comments" name="comments" maxlength="250"></textarea>



        </fieldset>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">





        </fieldset>

    </form>
</body>

</html>
